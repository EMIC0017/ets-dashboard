name: Refresh Jira Metrics

on:
  schedule:
    - cron: '0 * * * *'   # every hour on the hour
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  fetch-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Jira metrics
        env:
          JIRA_BASE_URL:  https://instacart.atlassian.net
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT:   PSO
        run: node scripts/fetch-jira-metrics.mjs

      - name: Commit updated metrics.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/metrics.json
          git diff --cached --quiet || git commit -m "chore: refresh Jira metrics [skip ci]"
          git push
